<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園生態系 - 木系實驗室</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 載入 React 核心庫 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ecfdf5; /* emerald-50 */
      background-image: radial-gradient(#a7f3d0 20%, transparent 20%), radial-gradient(#a7f3d0 20%, transparent 20%);
      background-position: 0 0, 25px 25px;
      background-size: 50px 50px;
    }
    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* 隱藏預設捲軸，美化呈現 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #059669; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 學習內容資料 (擷取自原 2.html) ---
    const SEED_DATA = [
      { id: 1, name: '蒲公英', method: '風力傳播', hint: '冠毛像降落傘，隨風飄散。', category: 'wind', icon: '🌼' },
      { id: 2, name: '大花咸豐草', method: '動物傳播', hint: '果實有倒刺，會附著在動物毛皮上。', category: 'animal', icon: '🌿' },
      { id: 3, name: '椰子', method: '水力傳播', hint: '果皮有纖維層，能漂浮在水面上。', category: 'water', icon: '🥥' },
      { id: 4, name: '鳳仙花', method: '彈力傳播', hint: '果實成熟乾燥後，輕碰就會爆裂彈出種子。', category: 'self', icon: '🌺' },
      { id: 5, name: '青楓', method: '風力傳播', hint: '果實有翅膀，像直升機般旋轉落下。', category: 'wind', icon: '🍁' },
      { id: 6, name: '羊角藤', method: '動物傳播', hint: '果實長滿刺毛，容易勾在衣物或動物身上。', category: 'animal', icon: '🌱' },
      { id: 7, name: '水筆仔', method: '水力傳播', hint: '胎生苗成熟後落水，隨潮水漂流。', category: 'water', icon: '🌲' },
      { id: 8, name: '酢漿草', method: '彈力傳播', hint: '果莢成熟時會裂開，將種子彈射出去。', category: 'self', icon: '☘️' },
      { id: 9, name: '雀榕', method: '動物傳播', hint: '果實多肉鮮豔，吸引鳥類食用後隨糞便排出。', category: 'animal', icon: '🍒' },
      { id: 10, name: '昭和草', method: '風力傳播', hint: '具有白色冠毛，能隨風飛行。', category: 'wind', icon: '🌾' }
    ];

    const CATEGORIES = [
      { id: 'wind', name: '風力傳播', icon: 'fa-wind', color: 'bg-teal-500', hover: 'hover:bg-teal-600' },
      { id: 'animal', name: '動物傳播', icon: 'fa-paw', color: 'bg-amber-500', hover: 'hover:bg-amber-600' },
      { id: 'water', name: '水力傳播', icon: 'fa-water', color: 'bg-blue-500', hover: 'hover:bg-blue-600' },
      { id: 'self', name: '彈力傳播', icon: 'fa-bomb', color: 'bg-rose-500', hover: 'hover:bg-rose-600' }
    ];

    // --- 教師測驗題庫 (20題) ---
    const QUIZ_QUESTIONS = [
      { q: "蒲公英的種子主要是靠什麼方式傳播？", options: ["風力傳播", "水力傳播", "動物傳播"], answer: "風力傳播" },
      { q: "大花咸豐草的果實會附著在人的衣服上，這是哪種傳播方式？", options: ["水力傳播", "動物傳播", "彈力傳播"], answer: "動物傳播" },
      { q: "椰子能夠漂浮在水面上傳播，是因為它的果皮有什麼特性？", options: ["有倒刺", "有纖維層", "有黏液"], answer: "有纖維層" },
      { q: "鳳仙花的果實成熟後，輕輕一碰就會裂開，這屬於？", options: ["風力傳播", "水力傳播", "彈力傳播"], answer: "彈力傳播" },
      { q: "青楓的種子長得像直升機的螺旋槳，它是利用什麼傳播？", options: ["風力傳播", "水力傳播", "動物傳播"], answer: "風力傳播" },
      { q: "雀榕的果實顏色鮮豔且多肉，主要吸引誰來幫忙傳播？", options: ["風", "鳥類等動物", "水流"], answer: "鳥類等動物" },
      { q: "水筆仔的胎生苗掉落後，會隨著什麼漂流到其他地方？", options: ["潮水", "強風", "動物"], answer: "潮水" },
      { q: "昭和草的種子具有白色冠毛，最適合哪種傳播方式？", options: ["風力傳播", "彈力傳播", "動物傳播"], answer: "風力傳播" },
      { q: "羊角藤的果實長滿刺毛，其傳播方式與下列何者最相似？", options: ["蒲公英", "大花咸豐草", "椰子"], answer: "大花咸豐草" },
      { q: "酢漿草的果莢成熟時會裂開將種子彈出，這與下列何者相同？", options: ["鳳仙花", "水筆仔", "雀榕"], answer: "鳳仙花" },
      { q: "下列哪一種植物的種子不是靠「風力」傳播的？", options: ["蒲公英", "青楓", "椰子"], answer: "椰子" },
      { q: "植物將種子傳播到遠處，最主要的目的是什麼？", options: ["讓人類食用", "避免和母株競爭陽光與養分", "裝飾環境"], answer: "避免和母株競爭陽光與養分" },
      { q: "靠「動物」傳播的種子，通常具有什麼特徵？", options: ["長有翅膀或冠毛", "有倒刺或果肉鮮美", "質輕且防水"], answer: "有倒刺或果肉鮮美" },
      { q: "靠「水力」傳播的果實，通常具備什麼條件？", options: ["果實沉重會沉入水底", "外皮防水且內部有空氣能漂浮", "一碰就會爆炸"], answer: "外皮防水且內部有空氣能漂浮" },
      { q: "如果一個種子長得很輕，而且上面有細毛，它最可能是哪種傳播方式？", options: ["風力傳播", "水力傳播", "彈力傳播"], answer: "風力傳播" },
      { q: "「動物傳播」除了果實附著在動物身上之外，還有哪一種常見的方式？", options: ["動物吃下果實後排泄出種子", "動物把種子踢進水裡", "動物對著種子吹氣"], answer: "動物吃下果實後排泄出種子" },
      { q: "黃野百合的豆莢乾燥後會扭曲並將種子彈出，這屬於？", options: ["風力傳播", "水力傳播", "彈力傳播"], answer: "彈力傳播" },
      { q: "棋盤腳的果實具有海綿質構造，它最可能是靠什麼傳播？", options: ["風力傳播", "水力傳播", "動物傳播"], answer: "水力傳播" },
      { q: "下列哪一組植物的傳播方式是相同的？", options: ["蒲公英和昭和草", "大花咸豐草和椰子", "鳳仙花和青楓"], answer: "蒲公英和昭和草" },
      { q: "了解植物種子的傳播方式，可以幫助我們？", options: ["預測植物分布的範圍", "知道植物的年齡", "改變植物的花色"], answer: "預測植物分布的範圍" }
    ];

    const App = () => {
      const [mode, setMode] = useState('menu'); // 'menu', 'lab', 'summary', 'quiz'
      
      // 實驗室狀態
      const [currentSeedIndex, setCurrentSeedIndex] = useState(0);
      const [labFeedback, setLabFeedback] = useState(null);
      const [labScore, setLabScore] = useState(0);

      // 測驗系統狀態
      const [userInfo, setUserInfo] = useState({ gradeClass: '', seatNumber: '', name: '' });
      const [answers, setAnswers] = useState({});
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [quizResult, setQuizResult] = useState(null);

      // --- 實驗室邏輯 ---
      const handleGuess = (categoryId) => {
        const seed = SEED_DATA[currentSeedIndex];
        if (seed.category === categoryId) {
          setLabFeedback({ isCorrect: true, title: "太棒了！分類正確！", hint: `【${seed.name}】的傳播方式是：${seed.method}。<br>${seed.hint}` });
          setLabScore(prev => prev + 10);
        } else {
          setLabFeedback({ isCorrect: false, title: "哎呀！分錯囉！", hint: `【${seed.name}】其實是靠 <span class="font-bold text-emerald-700">${seed.method}</span> 喔！<br>${seed.hint}` });
        }
      };

      const nextLabQuestion = () => {
        setLabFeedback(null);
        setCurrentSeedIndex(prev => (prev + 1) % SEED_DATA.length);
      };

      // --- 測驗系統邏輯 ---
      const handleAnswerChange = (questionIndex, answer) => {
        setAnswers({ ...answers, [questionIndex]: answer });
      };

      const handleSubmitQuiz = async (e) => {
        e.preventDefault();
        
        if (!userInfo.gradeClass || !userInfo.seatNumber || !userInfo.name) {
          alert('請填寫班級、座號與姓名！');
          return;
        }

        if (Object.keys(answers).length < QUIZ_QUESTIONS.length) {
          alert('還有題目未作答完畢喔！請檢查。');
          return;
        }

        setIsSubmitting(true);

        let score = 0;
        QUIZ_QUESTIONS.forEach((q, idx) => {
          if (answers[idx] === q.answer) score += 100 / QUIZ_QUESTIONS.length;
        });

        // 🌟 填入您的 Google Apps Script 網址
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbz_YOUR_SCRIPT_ID/exec'; 

        const formData = new FormData();
        // 🌟 關鍵修改：指定寫入木系的工作表2
        formData.append('sheetName', '工作表2'); 
        formData.append('gradeClass', userInfo.gradeClass);
        formData.append('seatNumber', userInfo.seatNumber);
        formData.append('name', userInfo.name);
        formData.append('score', Math.round(score));

        QUIZ_QUESTIONS.forEach((q, idx) => {
          formData.append(`q${idx + 1}`, answers[idx]);
        });

        try {
          // 若沒架設 GAS 伺服器，這裡只是演示送出，實際部署時請將 scriptUrl 換成有效網址
          await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: formData });
          setQuizResult({ score: Math.round(score), submitted: true });
        } catch (error) {
          console.error('Submission error:', error);
          alert('成績傳送失敗，請通知老師。');
        } finally {
          setIsSubmitting(false);
        }
      };

      // --- 渲染畫面 ---
      const renderHeader = (title, icon) => (
        <div className="bg-emerald-700 text-white p-4 shadow-md flex items-center justify-between sticky top-0 z-50">
          <div className="flex items-center gap-3 text-xl font-bold">
            <i className={`fa-solid ${icon}`}></i>
            <span>{title}</span>
          </div>
          <button 
            onClick={() => setMode('menu')}
            className="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg font-bold transition-colors flex items-center gap-2"
          >
            <i className="fa-solid fa-house"></i> 回大廳
          </button>
        </div>
      );

      const renderMenu = () => (
        <div className="flex-1 flex flex-col items-center justify-center p-6 fade-in">
          <div className="text-center mb-10">
            <div className="w-24 h-24 bg-emerald-600 text-white rounded-full flex items-center justify-center text-5xl mx-auto mb-4 shadow-lg shadow-emerald-500/40">
              <i className="fa-solid fa-leaf"></i>
            </div>
            <h1 className="text-5xl font-black text-emerald-800 tracking-wider mb-2">木系實驗室</h1>
            <p className="text-xl text-emerald-600 font-bold">種子的傳播大冒險</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
            <button onClick={() => { setMode('lab'); setLabScore(0); setCurrentSeedIndex(0); setLabFeedback(null); }} className="bg-white rounded-2xl p-8 shadow-xl hover:shadow-emerald-500/20 transition-all border-b-8 border-emerald-500 group">
              <div className="text-6xl text-emerald-500 mb-4 group-hover:scale-110 transition-transform"><i className="fa-solid fa-flask"></i></div>
              <h2 className="text-2xl font-bold text-gray-800 mb-2">實驗室遊戲</h2>
              <p className="text-gray-500">動手分類不同種子的傳播方式</p>
            </button>
            <button onClick={() => setMode('summary')} className="bg-white rounded-2xl p-8 shadow-xl hover:shadow-emerald-500/20 transition-all border-b-8 border-emerald-400 group">
              <div className="text-6xl text-emerald-400 mb-4 group-hover:scale-110 transition-transform"><i className="fa-solid fa-book-open"></i></div>
              <h2 className="text-2xl font-bold text-gray-800 mb-2">知識總結</h2>
              <p className="text-gray-500">複習四種傳播方式的特徵</p>
            </button>
            <button onClick={() => setMode('quiz')} className="bg-white rounded-2xl p-8 shadow-xl hover:shadow-emerald-500/20 transition-all border-b-8 border-emerald-600 group">
              <div className="text-6xl text-emerald-600 mb-4 group-hover:scale-110 transition-transform"><i className="fa-solid fa-file-signature"></i></div>
              <h2 className="text-2xl font-bold text-gray-800 mb-2">教師線上測驗</h2>
              <p className="text-gray-500">完成測驗，分數將送至工作表2</p>
            </button>
          </div>
        </div>
      );

      const renderLab = () => {
        const currentSeed = SEED_DATA[currentSeedIndex];
        return (
          <div className="flex-1 flex flex-col bg-emerald-50 fade-in">
            {renderHeader("實驗室：種子分類大考驗", "fa-flask")}
            
            <div className="flex-1 flex flex-col items-center justify-center p-6 relative">
              <div className="absolute top-4 right-6 bg-white px-4 py-2 rounded-full font-bold text-emerald-700 shadow border-2 border-emerald-200">
                目前得分: {labScore}
              </div>
              <div className="absolute top-4 left-6 bg-white px-4 py-2 rounded-full font-bold text-emerald-700 shadow border-2 border-emerald-200">
                題號: {currentSeedIndex + 1} / {SEED_DATA.length}
              </div>

              {!labFeedback ? (
                <div className="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8 text-center fade-in">
                  <h2 className="text-3xl font-black text-gray-800 mb-8">請問以下種子是靠什麼方式傳播的？</h2>
                  
                  <div className="text-9xl mb-6">{currentSeed.icon}</div>
                  <h3 className="text-4xl font-bold text-emerald-700 mb-10">{currentSeed.name}</h3>
                  
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {CATEGORIES.map(cat => (
                      <button 
                        key={cat.id} 
                        onClick={() => handleGuess(cat.id)}
                        className={`${cat.color} ${cat.hover} text-white py-4 rounded-xl font-bold text-xl shadow-md transition-transform hover:scale-105 flex flex-col items-center gap-2`}
                      >
                        <i className={`fa-solid ${cat.icon} text-3xl`}></i>
                        {cat.name}
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="w-full max-w-lg bg-white rounded-3xl shadow-2xl p-8 text-center fade-in">
                  <div className="text-6xl mb-4">{labFeedback.isCorrect ? "✨⭕✨" : "💦❌💦"}</div>
                  <h2 className={`text-3xl font-black mb-4 ${labFeedback.isCorrect ? 'text-green-600' : 'text-red-500'}`}>
                    {labFeedback.title}
                  </h2>
                  <div className="text-xl text-gray-700 mb-8 bg-gray-50 p-6 rounded-xl leading-relaxed" 
                       dangerouslySetInnerHTML={{ __html: labFeedback.hint }}></div>
                  <button 
                    onClick={nextLabQuestion}
                    className="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold text-xl hover:bg-emerald-700 transition-colors shadow-lg"
                  >
                    下一題 <i className="fa-solid fa-arrow-right ml-2"></i>
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderSummary = () => (
        <div className="flex-1 flex flex-col bg-white fade-in">
          {renderHeader("知識總結：四種傳播方式", "fa-book-open")}
          <div className="max-w-5xl mx-auto w-full p-8">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
              {CATEGORIES.map(cat => (
                <div key={cat.id} className="bg-gray-50 rounded-2xl p-6 border-l-8 shadow-sm" style={{borderColor: cat.id==='wind'?'#14b8a6':cat.id==='animal'?'#f59e0b':cat.id==='water'?'#3b82f6':'#f43f5e'}}>
                  <h3 className="text-2xl font-black mb-4 flex items-center gap-3">
                    <div className={`${cat.color} text-white w-10 h-10 flex items-center justify-center rounded-full`}>
                      <i className={`fa-solid ${cat.icon}`}></i>
                    </div>
                    {cat.name}
                  </h3>
                  <div className="space-y-4">
                    {SEED_DATA.filter(seed => seed.category === cat.id).map(seed => (
                      <div key={seed.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-start gap-4">
                        <div className="text-4xl">{seed.icon}</div>
                        <div>
                          <div className="font-bold text-lg text-gray-800">{seed.name}</div>
                          <div className="text-gray-600 text-sm">{seed.hint}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      const renderQuiz = () => (
        <div className="flex-1 flex flex-col bg-gray-100 fade-in">
          {renderHeader("教師線上測驗 (共20題)", "fa-file-signature")}
          
          <div className="flex-1 overflow-y-auto p-6">
            <div className="max-w-3xl mx-auto">
              {quizResult ? (
                <div className="bg-white p-10 rounded-3xl shadow-xl text-center fade-in">
                  <div className="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-5xl mx-auto mb-6">
                    <i className="fa-solid fa-check"></i>
                  </div>
                  <h2 className="text-4xl font-black text-gray-800 mb-4">測驗完成！</h2>
                  <p className="text-xl text-gray-600 mb-6">成績已成功傳送至資料庫 (工作表2)。</p>
                  <div className="text-6xl font-black text-emerald-600 mb-10">{quizResult.score} 分</div>
                  <button 
                    onClick={() => setMode('menu')}
                    className="px-8 py-4 bg-emerald-600 text-white rounded-xl font-bold text-xl hover:bg-emerald-700 transition-colors shadow-lg"
                  >
                    回到大廳
                  </button>
                </div>
              ) : (
                <form onSubmit={handleSubmitQuiz} className="space-y-8">
                  {/* 學生資料卡 */}
                  <div className="bg-white p-8 rounded-2xl shadow-md border-t-8 border-emerald-500">
                    <h2 className="text-2xl font-black text-gray-800 mb-6 border-b pb-4"><i className="fa-solid fa-user-graduate mr-2"></i>基本資料</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div>
                        <label className="block text-gray-700 font-bold mb-2">班級</label>
                        <input type="text" required value={userInfo.gradeClass} onChange={e => setUserInfo({...userInfo, gradeClass: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="例如: 四年甲班"/>
                      </div>
                      <div>
                        <label className="block text-gray-700 font-bold mb-2">座號</label>
                        <input type="number" required value={userInfo.seatNumber} onChange={e => setUserInfo({...userInfo, seatNumber: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="例如: 15"/>
                      </div>
                      <div>
                        <label className="block text-gray-700 font-bold mb-2">姓名</label>
                        <input type="text" required value={userInfo.name} onChange={e => setUserInfo({...userInfo, name: e.target.value})} className="w-full p-3 border rounded-xl bg-gray-50 focus:bg-white focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="你的名字"/>
                      </div>
                    </div>
                  </div>

                  {/* 測驗題目 */}
                  {QUIZ_QUESTIONS.map((q, idx) => (
                    <div key={idx} className="bg-white p-8 rounded-2xl shadow-md">
                      <h3 className="text-xl font-bold text-gray-800 mb-4">
                        <span className="inline-block w-8 h-8 bg-emerald-100 text-emerald-700 text-center leading-8 rounded-full mr-3">{idx + 1}</span>
                        {q.q}
                      </h3>
                      <div className="space-y-3 pl-11">
                        {q.options.map((opt, oIdx) => (
                          <label key={oIdx} className={`block p-4 border-2 rounded-xl cursor-pointer transition-colors ${answers[idx] === opt ? 'border-emerald-500 bg-emerald-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                            <input 
                              type="radio" 
                              name={`q-${idx}`} 
                              value={opt} 
                              onChange={() => handleAnswerChange(idx, opt)}
                              checked={answers[idx] === opt}
                              className="hidden"
                            />
                            <div className="flex items-center gap-3">
                              <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${answers[idx] === opt ? 'border-emerald-500' : 'border-gray-400'}`}>
                                {answers[idx] === opt && <div className="w-2.5 h-2.5 bg-emerald-500 rounded-full"></div>}
                              </div>
                              <span className={`text-lg ${answers[idx] === opt ? 'font-bold text-emerald-800' : 'text-gray-700'}`}>{opt}</span>
                            </div>
                          </label>
                        ))}
                      </div>
                    </div>
                  ))}

                  <div className="pt-8">
                    <button 
                      type="submit" 
                      disabled={isSubmitting}
                      className="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black text-2xl hover:bg-emerald-700 transition-all shadow-xl hover:shadow-emerald-500/30 disabled:opacity-70 flex justify-center items-center gap-3"
                    >
                      {isSubmitting ? <><i className="fa-solid fa-spinner fa-spin"></i> 傳送成績至工作表2...</> : <><i className="fa-solid fa-paper-plane"></i> 繳交考卷 (總分100分)</>}
                    </button>
                    <p className="text-sm text-center text-slate-400 mt-4">請確認 20 題皆已作答完畢再送出。</p>
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      );

      return (
        <div className="app-container">
          {mode === 'menu' && renderMenu()}
          {mode === 'lab' && renderLab()}
          {mode === 'summary' && renderSummary()}
          {mode === 'quiz' && renderQuiz()}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

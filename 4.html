<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園生態系：火系 - 互動實驗室</title>
  
  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 讓瀏覽器可以直接編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 自訂動畫樣式 -->
  <style>
    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    @keyframes drop-water {
      0% { transform: translateY(-50px) scale(1); opacity: 1; }
      100% { transform: translateY(50px) scale(0.5); opacity: 0; }
    }
    @keyframes slide-lid {
      0% { transform: translate(100px, -50px) rotate(20deg); opacity: 0; }
      100% { transform: translate(0, 0) rotate(0); opacity: 1; }
    }
    @keyframes fire-explosion {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(5); opacity: 1; }
      100% { transform: scale(6); opacity: 0; }
    }
    .animate-fade-in-up { animation: fade-in-up 0.4s ease-out forwards; }
    .animate-shake { animation: shake 0.5s ease-in-out; }
    .animate-drop-water { animation: drop-water 0.5s ease-in forwards; }
    .animate-slide-lid { animation: slide-lid 0.5s ease-out forwards; }
    .animate-fire-explosion { animation: fire-explosion 1s ease-out forwards; }
    
    /* 隱藏捲軸 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // 圖示元件庫 (Inline SVGs)
    // ==========================================
    const FlameIcon = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1"><path d="M12 2C12 2 5 9 5 14C5 17.866 8.13401 21 12 21C15.866 21 19 17.866 19 14C19 9 12 2 12 2ZM12 18C10.3431 18 9 16.6569 9 15C9 13 12 9 12 9C12 9 15 13 15 15C15 16.6569 13.6569 18 12 18Z"/></svg>;
    const WindIcon = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17.7 7.7a2.5 2.5 0 111.8 4.3H2M9.6 4.6A2 2 0 1111 8H2M12.6 19.4A2 2 0 1014 16H2"/></svg>;
    const DropletIcon = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>;
    const AlertIcon = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
    const CheckCircle = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const XCircle = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
    const PlayIcon = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const ResetIcon = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;

    // ==========================================
    // 實驗 1：長短蠟燭 (可選瓶子大小，觀察CO2下沉)
    // ==========================================
    function CandlesExperiment() {
      const [jarSize, setJarSize] = useState('small'); // small, large
      const [isCovered, setIsCovered] = useState(false);
      const [co2Level, setCo2Level] = useState(0); // 0 to 100 (%)
      const [status, setStatus] = useState('ready'); // ready, running, finished

      // 蠟燭高度設定 (%)
      const longCandleHeight = 60;
      const shortCandleHeight = 30;

      const isLongExtinguished = (100 - co2Level) < longCandleHeight;
      const isShortExtinguished = (100 - co2Level) < shortCandleHeight;

      useEffect(() => {
        let timer;
        if (isCovered && status === 'running') {
          timer = setInterval(() => {
            setCo2Level(prev => {
              // 大瓶子累積慢，小瓶子累積快
              const increment = jarSize === 'small' ? 3.5 : 1.5;
              const nextLevel = prev + increment;
              if (nextLevel >= 100) {
                setStatus('finished');
                return 100;
              }
              return nextLevel;
            });
          }, 100);
        }
        return () => clearInterval(timer);
      }, [isCovered, status, jarSize]);

      const handleStart = () => {
        setIsCovered(true);
        setStatus('running');
      };

      const handleReset = () => {
        setIsCovered(false);
        setCo2Level(0);
        setStatus('ready');
      };

      return (
        <div className="flex flex-col md:flex-row gap-8">
          {/* 左側：動畫顯示區 */}
          <div className="flex-1 bg-white p-6 rounded-2xl border-2 border-gray-200 flex flex-col items-center justify-center min-h-[400px]">
            <div className="relative flex items-end justify-center w-full h-80 border-b-4 border-gray-700 pb-2">
              
              {/* 長蠟燭 */}
              <div className="absolute left-1/3 flex flex-col items-center justify-end" style={{ height: `${longCandleHeight}%`, bottom: '8px' }}>
                {!isLongExtinguished && <FlameIcon className="w-8 h-8 text-orange-500 animate-pulse -mb-2" />}
                <div className="w-6 h-full bg-red-400 rounded-t-sm shadow-inner"></div>
              </div>
              
              {/* 短蠟燭 */}
              <div className="absolute right-1/3 flex flex-col items-center justify-end" style={{ height: `${shortCandleHeight}%`, bottom: '8px' }}>
                {!isShortExtinguished && <FlameIcon className="w-8 h-8 text-orange-500 animate-pulse -mb-2" />}
                <div className="w-6 h-full bg-blue-400 rounded-t-sm shadow-inner"></div>
              </div>

              {/* 廣口瓶 (依賴選擇的大小) */}
              <div 
                className={`absolute bottom-0 border-4 border-blue-200 bg-blue-50/10 rounded-t-3xl transition-all duration-500 overflow-hidden ${isCovered ? 'opacity-100' : 'opacity-0 -translate-y-10'}`}
                style={{
                  width: jarSize === 'small' ? '200px' : '300px',
                  height: jarSize === 'small' ? '250px' : '320px',
                  borderBottom: 'none'
                }}
              >
                {/* 二氧化碳視覺化 (從上往下長) */}
                <div 
                  className="absolute top-0 left-0 w-full bg-gray-500/40 backdrop-blur-sm transition-all duration-100"
                  style={{ height: `${co2Level}%` }}
                >
                  {co2Level > 10 && <div className="text-center mt-2 text-white font-bold text-sm tracking-widest drop-shadow-md">CO₂ 累積中</div>}
                </div>
              </div>

            </div>
          </div>

          {/* 右側：操作面板 */}
          <div className="flex-1 flex flex-col gap-6">
            <div className="bg-orange-50 p-6 rounded-2xl border border-orange-100">
              <h3 className="text-xl font-bold mb-4 text-orange-800">實驗控制面板</h3>
              
              <div className="mb-6">
                <label className="block font-bold text-gray-700 mb-2">1. 選擇廣口瓶大小：</label>
                <div className="flex gap-4">
                  <button 
                    disabled={status !== 'ready'}
                    onClick={() => setJarSize('small')}
                    className={`flex-1 py-2 px-4 rounded-lg font-bold border-2 transition-all ${jarSize === 'small' ? 'bg-orange-500 text-white border-orange-600 shadow-md' : 'bg-white text-gray-500 hover:border-orange-300 disabled:opacity-50'}`}
                  >
                    小廣口瓶
                  </button>
                  <button 
                    disabled={status !== 'ready'}
                    onClick={() => setJarSize('large')}
                    className={`flex-1 py-2 px-4 rounded-lg font-bold border-2 transition-all ${jarSize === 'large' ? 'bg-orange-500 text-white border-orange-600 shadow-md' : 'bg-white text-gray-500 hover:border-orange-300 disabled:opacity-50'}`}
                  >
                    大廣口瓶
                  </button>
                </div>
              </div>

              <div className="flex gap-4">
                {status === 'ready' ? (
                  <button onClick={handleStart} className="flex-1 bg-green-500 text-white py-3 px-4 rounded-xl font-bold hover:bg-green-600 flex items-center justify-center gap-2 shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                    <PlayIcon className="w-5 h-5" /> 蓋上廣口瓶開始
                  </button>
                ) : (
                  <button onClick={handleReset} className="flex-1 bg-gray-200 text-gray-700 py-3 px-4 rounded-xl font-bold hover:bg-gray-300 flex items-center justify-center gap-2 transition-all">
                    <ResetIcon className="w-5 h-5" /> 重置實驗
                  </button>
                )}
              </div>
            </div>

            {/* 結果解說 */}
            <div className={`p-6 rounded-2xl border transition-all duration-500 ${status === 'finished' ? 'bg-blue-50 border-blue-200 opacity-100' : 'bg-white border-gray-100 opacity-50'}`}>
              <h3 className="font-bold text-lg mb-2">觀察與結論：</h3>
              <p className="text-gray-700 mb-2">二氧化碳累積量：<span className="font-mono font-bold text-blue-600">{Math.round(co2Level)}%</span></p>
              <ul className="space-y-2 mb-4">
                <li className="flex items-center gap-2">長蠟燭：{isLongExtinguished ? <span className="text-red-500 font-bold flex items-center gap-1"><XCircle className="w-4 h-4"/>已缺氧熄滅</span> : <span className="text-green-500 font-bold flex items-center gap-1"><FlameIcon className="w-4 h-4"/>燃燒中</span>}</li>
                <li className="flex items-center gap-2">短蠟燭：{isShortExtinguished ? <span className="text-red-500 font-bold flex items-center gap-1"><XCircle className="w-4 h-4"/>已缺氧熄滅</span> : <span className="text-green-500 font-bold flex items-center gap-1"><FlameIcon className="w-4 h-4"/>燃燒中</span>}</li>
              </ul>
              {status === 'finished' && (
                <div className="bg-white p-3 rounded-lg border text-sm text-gray-700 shadow-sm animate-fade-in-up">
                  <strong>為什麼是高蠟燭先熄滅？</strong><br/>
                  燃燒產生的熱二氧化碳密度較小會往上升。在密閉瓶中，無路可去的二氧化碳會從上方開始累積往下沉。因此較高的蠟燭會先接觸到二氧化碳而缺氧熄滅！大瓶子空間大，所以累積到蠟燭高度需要較長時間。
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 實驗 2：燃燒三要素 (選擇題搭配組合實驗)
    // ==========================================
    function TriangleExperiment() {
      const [selections, setSelections] = useState({ fuel: null, heat: null, oxygen: null });
      const [testResult, setTestResult] = useState(null); // null, 'success', 'fail'

      const options = {
        fuel: [
          { id: 'wood', name: '乾燥木柴', valid: true, icon: '🪵' },
          { id: 'stone', name: '河邊石頭', valid: false, icon: '🪨' }
        ],
        heat: [
          { id: 'lighter', name: '打火機', valid: true, icon: '🔥' },
          { id: 'ice', name: '冰塊', valid: false, icon: '🧊' }
        ],
        oxygen: [
          { id: 'air', name: '充滿空氣', valid: true, icon: '🌬️' },
          { id: 'vacuum', name: '抽成真空', valid: false, icon: '🌑' }
        ]
      };

      const handleSelect = (category, id) => {
        setSelections(prev => ({ ...prev, [category]: id }));
        setTestResult(null); // 變更選擇就重置結果
      };

      const handleTest = () => {
        const f = options.fuel.find(o => o.id === selections.fuel)?.valid;
        const h = options.heat.find(o => o.id === selections.heat)?.valid;
        const o = options.oxygen.find(o => o.id === selections.oxygen)?.valid;
        
        if (f && h && o) setTestResult('success');
        else setTestResult('fail');
      };

      const isAllSelected = selections.fuel && selections.heat && selections.oxygen;

      return (
        <div className="flex flex-col items-center">
          <p className="text-gray-600 mb-6 text-center max-w-2xl">燃燒必須同時具備三個條件，缺一不可。請在下方的實驗桌上挑選材料，看看你能不能成功生火！</p>
          
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl mb-8">
            {/* 可燃物區 */}
            <div className="bg-amber-50 p-4 rounded-xl border-2 border-amber-200">
              <h3 className="font-bold text-center mb-4 text-amber-800 flex justify-center items-center gap-2">
                1. 可燃物 {selections.fuel && <CheckCircle className="w-5 h-5 text-green-500"/>}
              </h3>
              <div className="flex flex-col gap-3">
                {options.fuel.map(opt => (
                  <button 
                    key={opt.id} onClick={() => handleSelect('fuel', opt.id)}
                    className={`p-3 rounded-lg border-2 text-left font-bold flex items-center gap-3 transition-all ${selections.fuel === opt.id ? 'bg-amber-500 text-white border-amber-600 shadow-md' : 'bg-white text-gray-600 hover:border-amber-300'}`}
                  >
                    <span className="text-2xl">{opt.icon}</span> {opt.name}
                  </button>
                ))}
              </div>
            </div>

            {/* 熱能區 */}
            <div className="bg-red-50 p-4 rounded-xl border-2 border-red-200">
              <h3 className="font-bold text-center mb-4 text-red-800 flex justify-center items-center gap-2">
                2. 熱能 (達到燃點) {selections.heat && <CheckCircle className="w-5 h-5 text-green-500"/>}
              </h3>
              <div className="flex flex-col gap-3">
                {options.heat.map(opt => (
                  <button 
                    key={opt.id} onClick={() => handleSelect('heat', opt.id)}
                    className={`p-3 rounded-lg border-2 text-left font-bold flex items-center gap-3 transition-all ${selections.heat === opt.id ? 'bg-red-500 text-white border-red-600 shadow-md' : 'bg-white text-gray-600 hover:border-red-300'}`}
                  >
                    <span className="text-2xl">{opt.icon}</span> {opt.name}
                  </button>
                ))}
              </div>
            </div>

            {/* 助燃物區 */}
            <div className="bg-blue-50 p-4 rounded-xl border-2 border-blue-200">
              <h3 className="font-bold text-center mb-4 text-blue-800 flex justify-center items-center gap-2">
                3. 助燃物 {selections.oxygen && <CheckCircle className="w-5 h-5 text-green-500"/>}
              </h3>
              <div className="flex flex-col gap-3">
                {options.oxygen.map(opt => (
                  <button 
                    key={opt.id} onClick={() => handleSelect('oxygen', opt.id)}
                    className={`p-3 rounded-lg border-2 text-left font-bold flex items-center gap-3 transition-all ${selections.oxygen === opt.id ? 'bg-blue-500 text-white border-blue-600 shadow-md' : 'bg-white text-gray-600 hover:border-blue-300'}`}
                  >
                    <span className="text-2xl">{opt.icon}</span> {opt.name}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="text-center w-full max-w-xl">
            <button 
              disabled={!isAllSelected}
              onClick={handleTest}
              className={`w-full py-4 rounded-2xl font-black text-xl transition-all ${isAllSelected ? 'bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-lg hover:scale-105' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
            >
              開始測試燃燒！
            </button>
          </div>

          {/* 測試結果區 */}
          <div className="mt-8 h-40 w-full max-w-md flex items-center justify-center">
            {testResult === 'success' && (
              <div className="text-center animate-fade-in-up">
                <FlameIcon className="w-32 h-32 text-red-500 mx-auto animate-pulse" />
                <h3 className="text-2xl font-black text-red-600 mt-2">燃燒成功！</h3>
                <p className="text-gray-600 mt-1">三要素具備，產生了旺盛的火焰。</p>
              </div>
            )}
            {testResult === 'fail' && (
              <div className="text-center bg-gray-100 p-6 rounded-2xl border-2 border-gray-300 animate-shake">
                <h3 className="text-xl font-bold text-gray-700 flex items-center justify-center gap-2">
                  <XCircle className="w-6 h-6 text-red-500" /> 點火失敗
                </h3>
                <p className="text-gray-600 mt-2 text-left">
                  你缺少了：<br/>
                  {!options.fuel.find(o=>o.id===selections.fuel)?.valid && <span className="text-amber-600 font-bold">- 正確的可燃物 (石頭燒不起來)<br/></span>}
                  {!options.heat.find(o=>o.id===selections.heat)?.valid && <span className="text-red-600 font-bold">- 足夠的熱能 (冰塊無法達到燃點)<br/></span>}
                  {!options.oxygen.find(o=>o.id===selections.oxygen)?.valid && <span className="text-blue-600 font-bold">- 助燃物 (真空中沒有氧氣)<br/></span>}
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 實驗 3：粉塵起火 (調整粉末與火源，吹氣觸發)
    // ==========================================
    function DustExperiment() {
      const [powder, setPowder] = useState('flour'); // flour, sand
      const [fire, setFire] = useState('none'); // none, small, large
      const [isBlowing, setIsBlowing] = useState(false);
      const [explosionLevel, setExplosionLevel] = useState(0); // 0: 無, 1: 小燃燒, 2: 大塵爆

      const handleBlow = () => {
        setIsBlowing(true);
        
        // 判斷結果
        setTimeout(() => {
          if (powder === 'sand' || fire === 'none') {
            setExplosionLevel(0);
          } else if (powder === 'flour' && fire === 'small') {
            setExplosionLevel(1); // 蠟燭 + 麵粉 = 小燃燒
          } else if (powder === 'flour' && fire === 'large') {
            setExplosionLevel(2); // 噴燈 + 麵粉 = 大爆炸
          }
        }, 500); // 延遲一下讓粉塵先飛

        // 恢復原狀
        setTimeout(() => {
          setIsBlowing(false);
          setExplosionLevel(0);
        }, 3000);
      };

      return (
        <div className="flex flex-col md:flex-row gap-8 items-center justify-center">
          {/* 左側：動畫舞台 */}
          <div className="relative w-80 h-96 bg-gray-900 rounded-2xl border-4 border-gray-700 overflow-hidden shadow-2xl flex items-end justify-center pb-6">
            <div className="absolute top-4 left-4 text-gray-500 font-mono text-xs">實驗箱內部</div>
            
            {/* 火源顯示 */}
            <div className="absolute bottom-6 right-8 flex flex-col items-center">
              {fire === 'small' && <FlameIcon className="w-8 h-8 text-yellow-500 animate-pulse mb-1" />}
              {fire === 'large' && <FlameIcon className="w-16 h-16 text-blue-400 animate-pulse mb-1" style={{filter: 'drop-shadow(0 0 10px rgba(96, 165, 250, 0.8))'}} />}
              {fire === 'small' && <div className="w-4 h-12 bg-white rounded-sm"></div>}
              {fire === 'large' && <div className="w-8 h-12 bg-gray-500 rounded-md"></div>}
              {fire === 'none' && <div className="text-gray-600 text-sm mt-8">無火源</div>}
            </div>

            {/* 粉末堆 */}
            <div className={`absolute bottom-6 left-12 w-16 h-8 rounded-t-full transition-opacity duration-300 ${isBlowing ? 'opacity-0' : 'opacity-100'} ${powder === 'flour' ? 'bg-amber-100' : 'bg-yellow-700'}`}></div>

            {/* 吹氣粉塵飛揚動畫 */}
            {isBlowing && (
              <div className={`absolute inset-0 flex items-center justify-center ${powder === 'flour' ? 'bg-amber-100/40' : 'bg-yellow-700/40'}`}>
                <div className="w-full h-full flex gap-2 flex-wrap p-4 animate-pulse">
                   {/* 模擬粒子感 */}
                   {[...Array(20)].map((_, i) => (
                     <div key={i} className={`w-2 h-2 rounded-full ${powder === 'flour' ? 'bg-white' : 'bg-yellow-800'}`} style={{transform: `translate(${Math.random()*100}px, ${Math.random()*-200}px)`}}></div>
                   ))}
                </div>
              </div>
            )}

            {/* 爆炸特效 */}
            {explosionLevel === 1 && (
              <div className="absolute inset-0 z-30 flex items-center justify-center pointer-events-none mix-blend-screen">
                <div className="w-40 h-40 bg-orange-500 rounded-full animate-ping opacity-60"></div>
                <FlameIcon className="absolute w-32 h-32 text-yellow-400 animate-pulse" />
              </div>
            )}
            
            {explosionLevel === 2 && (
              <div className="absolute inset-0 z-40 flex items-center justify-center pointer-events-none mix-blend-screen bg-red-500/30">
                <div className="absolute w-full h-full bg-red-500 animate-fire-explosion rounded-full"></div>
                <div className="font-black text-white text-5xl drop-shadow-[0_0_15px_rgba(255,0,0,1)] scale-150 animate-shake z-50">大塵爆!</div>
              </div>
            )}
          </div>

          {/* 右側：控制面板 */}
          <div className="max-w-sm w-full flex flex-col gap-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
              <h3 className="font-bold text-gray-800 mb-3">1. 選擇粉末：</h3>
              <div className="flex gap-2 mb-6">
                <button onClick={() => setPowder('flour')} className={`flex-1 py-2 rounded-lg font-bold border-2 ${powder === 'flour' ? 'bg-amber-100 border-amber-400 text-amber-800' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}>麵粉 (可燃)</button>
                <button onClick={() => setPowder('sand')} className={`flex-1 py-2 rounded-lg font-bold border-2 ${powder === 'sand' ? 'bg-yellow-100 border-yellow-600 text-yellow-800' : 'border-gray-200 text-gray-500 hover:bg-gray-50'}`}>乾燥沙子 (不可燃)</button>
              </div>

              <h3 className="font-bold text-gray-800 mb-3">2. 選擇火源：</h3>
              <div className="flex gap-2 mb-6 text-sm">
                <button onClick={() => setFire('none')} className={`flex-1 py-2 rounded-lg font-bold border-2 ${fire === 'none' ? 'bg-gray-200 border-gray-400 text-gray-800' : 'border-gray-200 text-gray-500'}`}>無火源</button>
                <button onClick={() => setFire('small')} className={`flex-1 py-2 rounded-lg font-bold border-2 ${fire === 'small' ? 'bg-orange-100 border-orange-400 text-orange-800' : 'border-gray-200 text-gray-500'}`}>打火機</button>
                <button onClick={() => setFire('large')} className={`flex-1 py-2 rounded-lg font-bold border-2 ${fire === 'large' ? 'bg-red-100 border-red-500 text-red-800' : 'border-gray-200 text-gray-500'}`}>高溫噴燈</button>
              </div>

              <button 
                onClick={handleBlow}
                disabled={isBlowing}
                className="w-full bg-blue-500 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-600 disabled:opacity-50 transition-all flex items-center justify-center gap-2 shadow-lg"
              >
                <WindIcon className="w-6 h-6" /> {isBlowing ? '粉塵飛揚中...' : '用力吹氣！'}
              </button>
            </div>

            {/* 結果解說 */}
            <div className="h-32">
              {explosionLevel > 0 && (
                <div className="p-4 bg-red-50 border border-red-200 rounded-xl text-red-800 text-sm animate-fade-in-up">
                  <strong className="text-base flex items-center gap-1"><AlertIcon className="w-5 h-5"/> 發生塵爆現象！</strong>
                  當可燃粉末（麵粉）散佈在空氣中，與氧氣接觸表面積劇增。此時遇到足夠能量的火源，就會瞬間大面積劇烈燃燒，產生爆炸威力。
                </div>
              )}
              {isBlowing && explosionLevel === 0 && powder === 'sand' && (
                <div className="p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-600 text-sm animate-fade-in-up">
                  <strong>安全的飛揚：</strong>沙子不是可燃物，所以就算遇到火源，也只會弄髒環境，不會起火。
                </div>
              )}
               {isBlowing && explosionLevel === 0 && powder === 'flour' && fire === 'none' && (
                <div className="p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-600 text-sm animate-fade-in-up">
                  <strong>缺少熱能：</strong>麵粉雖然可燃且飄散在空中（滿足兩要素），但因為「沒有火源」，所以不會發生危險。
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 實驗 4：滅火與安全 (廚房油鍋起火互動)
    // ==========================================
    function KitchenFire() {
      // 狀態： burning, water-exploded, covered, extinguished
      const [fireState, setFireState] = useState('burning');
      const [toolUsed, setToolUsed] = useState(null);

      const handleUseTool = (tool) => {
        setToolUsed(tool);
        if (tool === 'water') {
          setTimeout(() => setFireState('water-exploded'), 500); // 配合水滴落下的動畫時間
        } else if (tool === 'lid') {
          setTimeout(() => setFireState('covered'), 500); // 配合鍋蓋滑動的動畫時間
        } else if (tool === 'extinguisher') {
          setFireState('extinguished');
        }
      };

      const handleReset = () => {
        setFireState('burning');
        setToolUsed(null);
      };

      return (
        <div className="max-w-3xl mx-auto flex flex-col items-center">
          <h2 className="text-2xl font-bold mb-2">突發狀況：油鍋起火！</h2>
          <p className="text-gray-600 mb-6 text-center">你在廚房炒菜，突然油鍋燒起來了！時間緊迫，請趕快選擇下方的工具來滅火！</p>

          {/* 互動舞台 */}
          <div className="relative w-full max-w-lg h-80 bg-orange-50 rounded-2xl border-4 border-gray-300 flex items-end justify-center pb-10 overflow-hidden mb-8">
            
            {/* 瓦斯爐背景 */}
            <div className="absolute bottom-0 w-full h-8 bg-gray-800 rounded-b-xl flex justify-center gap-10 pt-2">
               <div className="w-8 h-2 bg-red-500 rounded-full"></div>
            </div>

            {/* 鍋子 */}
            <div className="relative w-48 h-20 bg-gray-700 rounded-b-3xl border-t-8 border-gray-800 z-10 flex justify-center">
              <div className="absolute -left-16 top-2 w-16 h-3 bg-gray-800 rounded-l-full rotate-12"></div> {/* 鍋把 */}
              
              {/* 正常火勢 */}
              {fireState === 'burning' && (
                <div className="absolute bottom-10 flex">
                  <FlameIcon className="w-24 h-24 text-orange-500 animate-pulse" />
                  <FlameIcon className="w-16 h-16 text-yellow-400 animate-pulse absolute top-4 left-4" />
                </div>
              )}

              {/* 潑水特效 */}
              {toolUsed === 'water' && fireState === 'burning' && (
                 <div className="absolute -top-32 animate-drop-water z-30">
                   <DropletIcon className="w-16 h-16 text-blue-400" />
                 </div>
              )}

              {/* 水爆炸大火球 */}
              {fireState === 'water-exploded' && (
                <div className="absolute bottom-0 z-40 w-full flex justify-center items-center">
                  <div className="absolute w-64 h-64 bg-red-600 rounded-full mix-blend-screen opacity-80 animate-ping"></div>
                  <FlameIcon className="w-64 h-64 text-yellow-300 absolute bottom-0 transform scale-150 animate-shake drop-shadow-[0_0_20px_rgba(255,0,0,1)]" />
                  <div className="absolute -top-20 font-black text-white text-3xl drop-shadow-md z-50 whitespace-nowrap bg-red-600/80 p-2 rounded">油水噴濺 轟！</div>
                </div>
              )}

              {/* 鍋蓋 */}
              {(toolUsed === 'lid' || fireState === 'covered') && (
                <div className={`absolute -top-6 w-52 h-8 bg-gray-400 rounded-t-full border-b-4 border-gray-500 z-30 flex justify-center ${toolUsed === 'lid' && fireState !== 'covered' ? 'animate-slide-lid' : ''}`}>
                   <div className="w-10 h-4 bg-gray-800 rounded-t-lg -mt-4"></div> {/* 鍋蓋頭 */}
                </div>
              )}

              {/* 滅火器白煙 */}
               {fireState === 'extinguished' && (
                <div className="absolute bottom-10 z-20">
                  <div className="w-40 h-32 bg-gray-200/80 rounded-full blur-xl animate-pulse"></div>
                </div>
              )}
            </div>
          </div>

          {/* 工具選擇區 */}
          {fireState === 'burning' && toolUsed === null ? (
            <div className="grid grid-cols-3 gap-4 w-full max-w-lg">
              <button onClick={() => handleUseTool('water')} className="bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 p-4 rounded-2xl flex flex-col items-center gap-2 transition-all hover:scale-105 shadow-sm">
                <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white"><DropletIcon className="w-6 h-6"/></div>
                <span className="font-bold text-blue-800">一杯水</span>
              </button>
              <button onClick={() => handleUseTool('lid')} className="bg-gray-100 hover:bg-gray-200 border-2 border-gray-300 p-4 rounded-2xl flex flex-col items-center gap-2 transition-all hover:scale-105 shadow-sm transform scale-110 shadow-md">
                <div className="w-12 h-12 bg-gray-600 rounded-full flex items-center justify-center text-white text-xl font-bold">蓋</div>
                <span className="font-bold text-gray-800 text-lg">大鍋蓋</span>
              </button>
              <button onClick={() => handleUseTool('extinguisher')} className="bg-red-50 hover:bg-red-100 border-2 border-red-200 p-4 rounded-2xl flex flex-col items-center gap-2 transition-all hover:scale-105 shadow-sm">
                <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white text-xl font-bold">滅</div>
                <span className="font-bold text-red-800">滅火器</span>
              </button>
            </div>
          ) : (
            <div className="w-full max-w-lg">
               {fireState === 'water-exploded' && (
                 <div className="bg-red-100 border-l-4 border-red-600 p-4 rounded-r-xl animate-shake">
                   <h3 className="font-bold text-red-800 text-lg flex items-center gap-2"><XCircle className="w-6 h-6"/> 絕對不行！超危險！</h3>
                   <p className="text-red-700 mt-2">油的溫度非常高，水加進去會瞬間沸騰變成水蒸氣，體積膨脹1700倍！這會把燃燒的熱油帶到空中，引發俗稱的「油鍋爆燃」，火勢會瞬間擴大燒毀廚房！</p>
                 </div>
               )}
               {fireState === 'covered' && (
                 <div className="bg-green-100 border-l-4 border-green-600 p-4 rounded-r-xl animate-fade-in-up">
                   <h3 className="font-bold text-green-800 text-lg flex items-center gap-2"><CheckCircle className="w-6 h-6"/> 正確做法！危機解除</h3>
                   <p className="text-green-700 mt-2">蓋上鍋蓋切斷了「氧氣（助燃物）」，運用了窒息法滅火。這是處理初期油鍋起火最快、最安全的步驟！記得還要關閉瓦斯爐喔。</p>
                 </div>
               )}
               {fireState === 'extinguished' && (
                 <div className="bg-yellow-100 border-l-4 border-yellow-600 p-4 rounded-r-xl animate-fade-in-up">
                   <h3 className="font-bold text-yellow-800 text-lg flex items-center gap-2"><CheckCircle className="w-6 h-6"/> 火勢撲滅，但要小心</h3>
                   <p className="text-yellow-700 mt-2">滅火器可以滅火，但如果直接對著油鍋噴射，強大的壓力可能會把熱油噴濺出來燙傷自己。油鍋起火首選還是「蓋鍋蓋」最安全。</p>
                 </div>
               )}
               
               <button onClick={handleReset} className="mt-6 w-full py-3 bg-gray-800 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-gray-700 transition-all">
                 <ResetIcon className="w-5 h-5"/> 再試一次
               </button>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 主應用程式元件 (Tab 控制)
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('candles');

      const tabs = [
        { id: 'candles', title: '長短蠟燭', icon: <FlameIcon className="w-5 h-5" /> },
        { id: 'triangle', title: '燃燒三要素', icon: <FlameIcon className="w-5 h-5" /> }, // 簡化 icon 引用
        { id: 'dust', title: '粉塵起火', icon: <WindIcon className="w-5 h-5" /> },
        { id: 'safety', title: '廚房滅火', icon: <AlertIcon className="w-5 h-5" /> },
      ];

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-800 pb-12">
          {/* 頂部 Header */}
          <header className="bg-gradient-to-r from-orange-600 to-red-600 text-white p-4 shadow-lg sticky top-0 z-50">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <h1 className="text-xl md:text-2xl font-black flex items-center gap-3">
                <FlameIcon className="w-8 h-8 text-yellow-300" />
                火系：空氣與燃燒 - 互動實驗室
              </h1>
            </div>
          </header>

          <main className="max-w-5xl mx-auto p-4 md:p-6 mt-6">
            <div className="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
              
              {/* 導航 Tabs */}
              <div className="flex border-b bg-gray-50 overflow-x-auto hide-scrollbar">
                {tabs.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex-1 flex justify-center items-center gap-2 px-4 py-5 font-bold text-lg transition-all whitespace-nowrap
                      ${activeTab === tab.id ? 'bg-white text-orange-600 border-b-4 border-orange-500' : 'text-gray-500 hover:bg-orange-50 hover:text-orange-400 border-b-4 border-transparent'}`}
                  >
                    {tab.icon} {tab.title}
                  </button>
                ))}
              </div>

              {/* 內容區塊 */}
              <div className="p-6 md:p-10 min-h-[500px]">
                {activeTab === 'candles' && (
                  <div className="animate-fade-in-up"><CandlesExperiment /></div>
                )}
                {activeTab === 'triangle' && (
                  <div className="animate-fade-in-up"><TriangleExperiment /></div>
                )}
                {activeTab === 'dust' && (
                  <div className="animate-fade-in-up"><DustExperiment /></div>
                )}
                {activeTab === 'safety' && (
                  <div className="animate-fade-in-up"><KitchenFire /></div>
                )}
              </div>
            </div>
          </main>
        </div>
      );
    }

    // 掛載 React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園生態系 - 金系實驗室</title>
  
  <!-- 載入 Tailwind CSS (處理排版與美觀) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 載入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel (讓瀏覽器可以直接看懂 React JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 自訂動畫效果 */
    @keyframes pulse-yellow {
      0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(234, 179, 8, 0); }
      100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); }
    }
    .bulb-glow { animation: pulse-yellow 2s infinite; }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .floating { animation: float 3s ease-in-out infinite; }
    
    /* 隱藏捲軸但保持可捲動 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans antialiased text-slate-800">
  <!-- React 渲染的目標容器 -->
  <div id="root"></div>

  <!-- React 程式碼開始 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 定義校園物品清單與其金系特性
    const CAMPUS_ITEMS = [
      { id: 'nail', name: '鐵釘', type: '金屬(鐵)', magnetic: true, conductive: true, rustable: true, icon: 'fa-screwdriver', color: 'text-slate-500' },
      { id: 'copper_wire', name: '銅線', type: '金屬(銅)', magnetic: false, conductive: true, rustable: false, icon: 'fa-bolt', color: 'text-orange-500' },
      { id: 'aluminum_can', name: '鋁罐', type: '金屬(鋁)', magnetic: false, conductive: true, rustable: false, icon: 'fa-prescription-bottle', color: 'text-gray-400' },
      { id: 'paperclip', name: '迴紋針', type: '金屬(鋼/鐵)', magnetic: true, conductive: true, rustable: true, icon: 'fa-paperclip', color: 'text-slate-400' },
      { id: 'branch', name: '樹枝', type: '木材', magnetic: false, conductive: false, rustable: false, icon: 'fa-leaf', color: 'text-green-700' },
      { id: 'ruler', name: '塑膠尺', type: '塑膠', magnetic: false, conductive: false, rustable: false, icon: 'fa-ruler', color: 'text-blue-400' },
      { id: 'eraser', name: '橡皮擦', type: '橡膠', magnetic: false, conductive: false, rustable: false, icon: 'fa-eraser', color: 'text-pink-400' },
      { id: 'pencil_lead', name: '鉛筆芯', type: '石墨(非金屬)', magnetic: false, conductive: true, rustable: false, icon: 'fa-pencil', color: 'text-slate-800' },
    ];

    // --- 20題測驗題庫 (一題5分) ---
    const QUIZ_QUESTIONS = [
      // 三年級：磁性
      { id: 1, category: '三年級(磁性)', text: '磁鐵可以吸引下列哪一種校園物質？', options: ['鐵釘', '塑膠尺', '橡皮擦', '樹枝'], answer: '鐵釘' },
      { id: 2, category: '三年級(磁性)', text: '下列哪一種金屬「不能」被磁鐵吸引？', options: ['鐵片', '銅線', '鋼釘', '鐵製迴紋針'], answer: '銅線' },
      { id: 3, category: '三年級(磁性)', text: '磁鐵的哪一部份磁力最強？', options: ['中間', '兩端(磁極)', '側面', '各部位都一樣強'], answer: '兩端(磁極)' },
      { id: 4, category: '三年級(磁性)', text: '把兩個磁鐵的 N極 和 S極 互相靠近，會發生什麼事？', options: ['互相推開', '互相吸引', '沒有反應', '會發熱'], answer: '互相吸引' },
      { id: 5, category: '三年級(磁性)', text: '日常生活中，哪一個物品裡面「沒有」用到磁鐵的特性？', options: ['鉛筆盒的磁扣', '冰箱門的膠條', '黑板上的彩色吸鐵', '橡皮擦'], answer: '橡皮擦' },
      // 四年級：導電
      { id: 6, category: '四年級(導電)', text: '電池有凸起的那一端，我們稱為什麼極？', options: ['正極', '負極', '北極(N極)', '南極(S極)'], answer: '正極' },
      { id: 7, category: '四年級(導電)', text: '能夠讓電流通過的物質，在科學上稱為什麼？', options: ['絕緣體', '良導體', '半導體', '不良導體'], answer: '良導體' },
      { id: 8, category: '四年級(導電)', text: '下列哪一個物品可以接在電路中，並且讓燈泡發光？', options: ['塑膠繩', '棉線', '鋁罐', '乾木條'], answer: '鋁罐' },
      { id: 9, category: '四年級(導電)', text: '「鉛筆芯」的主要成分是石墨，請問它連接在電路中能導電嗎？', options: ['能導電', '不能導電', '泡水後才能導電', '加熱後才能導電'], answer: '能導電' },
      { id: 10, category: '四年級(導電)', text: '如果發現電線走火（電線著火），為了安全，第一步應該先怎麼做？', options: ['用水潑滅', '用剪刀剪斷電線', '關閉電源或拔掉插頭', '用手拍滅'], answer: '關閉電源或拔掉插頭' },
      // 六年級：生鏽
      { id: 11, category: '六年級(生鏽)', text: '鐵製品生鏽，主要是因為接觸了水和空氣中的哪一種氣體？', options: ['二氧化碳', '氧氣', '氮氣', '氫氣'], answer: '氧氣' },
      { id: 12, category: '六年級(生鏽)', text: '哪一種環境下的鐵釘最容易生鏽？', options: ['乾燥的沙漠', '潮濕的浴室', '真空包裝內', '完全浸泡在沙拉油中'], answer: '潮濕的浴室' },
      { id: 13, category: '六年級(生鏽)', text: '為了防止腳踏車的鏈條生鏽，我們通常會怎麼做？', options: ['塗肥皂水', '泡在水中', '塗抹潤滑油', '用火烤'], answer: '塗抹潤滑油' },
      { id: 14, category: '六年級(生鏽)', text: '鐵生鏽後產生的鐵鏽，通常是什麼顏色的？', options: ['銀白色', '紅褐色', '黑灰色', '透明無色'], answer: '紅褐色' },
      { id: 15, category: '六年級(生鏽)', text: '比較「生鏽的鐵」和「原本的鐵」，下列敘述何者正確？', options: ['生鏽的鐵比較硬', '原本的鐵表面比較粗糙', '原本的鐵能被磁鐵吸引，生鏽的鐵鏽磁性會消失或減弱', '兩者都能導電且導電性一樣好'], answer: '原本的鐵能被磁鐵吸引，生鏽的鐵鏽磁性會消失或減弱' },
      // 六年級：綜合統整
      { id: 16, category: '六年級(統整)', text: '小明想分類校園中的物品，他用磁鐵測試，下列哪一組會被分在「有磁性」的同一類？', options: ['鐵釘、剪刀的鐵刃', '銅線、鋁箔紙', '塑膠尺、橡皮擦', '玻璃杯、書本'], answer: '鐵釘、剪刀的鐵刃' },
      { id: 17, category: '六年級(統整)', text: '如果將「金屬」作為一個分類標準，下列哪一個物品不屬於此類？', options: ['鐵釘', '迴紋針', '鋁罐', '樹枝'], answer: '樹枝' },
      { id: 18, category: '六年級(統整)', text: '迴紋針通常是鐵或鋼製成的，因此它具備了哪些科學特性？', options: ['有磁性、能導電、會生鏽', '無磁性、能導電、不會生鏽', '有磁性、不能導電、會生鏽', '無磁性、不能導電、不會生鏽'], answer: '有磁性、能導電、會生鏽' },
      { id: 19, category: '六年級(統整)', text: '「銅線」具備良好的導電性但「不具磁性」，在生活中最適合用來做什麼？', options: ['冰箱上的磁鐵貼', '電線裡面的導電芯', '黑板的彩色吸鐵', '指南針的指針'], answer: '電線裡面的導電芯' },
      { id: 20, category: '六年級(統整)', text: '在校園實驗中觀察到的「鋁罐」，我們發現它的特性是？', options: ['會生鏽、能導電', '不會生鏽、能被磁鐵吸引', '能導電、不能被磁鐵吸引', '有磁性、是絕緣體'], answer: '能導電、不能被磁鐵吸引' },
    ];

    const App = () => {
      // 狀態管理
      const [mode, setMode] = useState('menu'); // 'menu', 'lab', 'summary', 'quiz'
      const [activeTab, setActiveTab] = useState('magnetism'); 
      const [testedResults, setTestedResults] = useState({});
      
      // 實驗桌狀態
      const [benchItem, setBenchItem] = useState(null);
      const [testState, setTestState] = useState('idle'); 
      const [feedbackMsg, setFeedbackMsg] = useState('');

      // 線上測驗狀態
      const [quizAnswers, setQuizAnswers] = useState({ name: '', answers: {} });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitSuccess, setSubmitSuccess] = useState(false);
      const [finalScore, setFinalScore] = useState(0);

      // 取得目前已作答題數
      const answeredCount = Object.keys(quizAnswers.answers).length;

      // 切換物品到實驗桌
      const handleSelectBenchItem = (item) => {
        setBenchItem(item);
        setTestState('idle');
        setFeedbackMsg('');
      };

      // 執行實驗
      const runTest = () => {
        if (!benchItem) return;
        setTestState('testing');
        setFeedbackMsg('實驗進行中...');
        setTimeout(() => {
          setTestState('result');
          let resultKey = '';
          let message = '';
          if (activeTab === 'magnetism') {
            resultKey = 'magnetic';
            message = benchItem.magnetic ? `【發現！】${benchItem.name} 被磁鐵吸住了！因為它含有鐵的成分。` : `【無反應】${benchItem.name} 沒有被磁鐵吸引。不是所有金屬都有磁性喔！`;
          } else if (activeTab === 'conductivity') {
            resultKey = 'conductive';
            message = benchItem.conductive ? `【亮了！】電流通過 ${benchItem.name}，燈泡發光了！它是良導體。` + (benchItem.id === 'pencil_lead' ? ' (石墨雖然是非金屬，但也能導電喔！)' : '') : `【不亮】${benchItem.name} 無法讓電流通過，它是絕緣體。`;
          } else if (activeTab === 'rust') {
            resultKey = 'rustable';
            message = benchItem.rustable ? `【生鏽了！】噴水並經過幾天後，${benchItem.name} 表面產生了紅褐色的鐵鏽。` : `【無變化】${benchItem.name} 在水和空氣中沒有生鏽反應。`;
          }
          setFeedbackMsg(message);
          setTestedResults(prev => ({ ...prev, [benchItem.id]: { ...(prev[benchItem.id] || {}), [resultKey]: benchItem[resultKey] } }));
        }, 1500);
      };

      const getTotalTestsCount = () => {
        let count = 0;
        Object.values(testedResults).forEach(itemTests => count += Object.keys(itemTests).length);
        return count;
      };

      // 處理選擇答案
      const handleOptionSelect = (questionId, optionValue) => {
        setQuizAnswers(prev => ({
          ...prev,
          answers: { ...prev.answers, [questionId]: optionValue }
        }));
      };

      // 處理測驗提交
      const handleSubmitQuiz = (e) => {
        e.preventDefault();
        
        // 檢查是否20題都做完了
        if (answeredCount < QUIZ_QUESTIONS.length) {
          alert(`還有題目未作答喔！目前進度：${answeredCount}/${QUIZ_QUESTIONS.length}`);
          return;
        }

        setIsSubmitting(true);

        // 計算分數 (一題 5 分)
        let score = 0;
        QUIZ_QUESTIONS.forEach(q => {
          if (quizAnswers.answers[q.id] === q.answer) {
            score += 5;
          }
        });
        setFinalScore(score);

        // ⚠️ 老師請注意：請將下方的網址替換成您的 Google Apps Script 部署網址
        const GOOGLE_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

        if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
          setTimeout(() => {
            setIsSubmitting(false);
            setSubmitSuccess(true);
            window.scrollTo(0, 0); // 回到最上方看成績
          }, 1500);
          return;
        }

        // --- 真實傳送資料到 Google Sheets 的程式碼 ---
        const formData = new FormData();
        formData.append('name', quizAnswers.name);
        formData.append('score', score); // 傳送總分
        
        // 將 20 題的答案依序加入 formData (q1, q2 ... q20)
        QUIZ_QUESTIONS.forEach(q => {
          formData.append(`q${q.id}`, quizAnswers.answers[q.id] || '');
        });

        fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          body: formData,
          mode: 'no-cors'
        })
        .then(() => {
          setIsSubmitting(false);
          setSubmitSuccess(true);
          window.scrollTo(0, 0);
        })
        .catch(error => {
          console.error('Error!', error.message);
          setIsSubmitting(false);
          alert('傳送失敗，請檢查網路連線。');
        });
      };

      // --- 元件：主選單 ---
      const renderMenu = () => (
        <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gradient-to-br from-amber-100 to-orange-200">
          <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-3xl w-full text-center transform transition-all">
            <div className="text-amber-500 mb-4 text-6xl floating">
              <i className="fa-solid fa-atom"></i>
            </div>
            <h1 className="text-4xl font-black text-slate-800 mb-2">校園生態系 - 金系</h1>
            <p className="text-lg text-slate-600 mb-8 font-medium">探索校園物質的特性：磁性、導電性與生鏽</p>
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <button onClick={() => setMode('lab')} className="group relative p-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all overflow-hidden">
                <div className="relative z-10 flex flex-col items-center">
                  <i className="fa-solid fa-flask text-4xl mb-3 group-hover:scale-110 transition-transform"></i>
                  <span className="text-xl font-bold">進入實驗室</span>
                  <span className="text-sm text-blue-100 mt-1">動手測試 8 種物質</span>
                </div>
              </button>
              
              <button onClick={() => setMode('summary')} className="group relative p-6 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all overflow-hidden">
                <div className="relative z-10 flex flex-col items-center">
                  <i className="fa-solid fa-table-list text-4xl mb-3 group-hover:scale-110 transition-transform"></i>
                  <span className="text-xl font-bold">物質分類總表</span>
                  <span className="text-sm text-emerald-100 mt-1">實驗結果統整</span>
                </div>
              </button>

              <button onClick={() => {setMode('quiz'); setSubmitSuccess(false); setQuizAnswers({name: '', answers: {}}); setFinalScore(0); window.scrollTo(0, 0);}} className="group relative p-6 bg-gradient-to-r from-rose-500 to-pink-600 text-white rounded-2xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all overflow-hidden">
                <div className="relative z-10 flex flex-col items-center">
                  <i className="fa-solid fa-file-signature text-4xl mb-3 group-hover:scale-110 transition-transform"></i>
                  <span className="text-xl font-bold">線上測驗</span>
                  <span className="text-sm text-rose-100 mt-1">共20題・紀錄成績</span>
                </div>
              </button>
            </div>
            
            <div className="mt-8 text-sm text-slate-500 bg-slate-50 p-4 rounded-xl text-left border border-slate-100">
              <h3 className="font-bold text-slate-700 mb-2"><i className="fa-solid fa-book-open mr-2"></i>涵蓋單元：</h3>
              <ul className="list-disc pl-5 space-y-1">
                <li>三年級：「神奇的磁鐵」</li>
                <li>四年級：「燈泡亮了」（導電）</li>
                <li>六年級：「物質的變化」（生鏽與防鏽）</li>
                <li>六年級：「物質的特性與分類」（綜合統整）</li>
              </ul>
            </div>
          </div>
        </div>
      );

      // --- 元件：實驗室介面 (省略部分重複代碼，保持不變) ---
      const renderLab = () => (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <header className="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-20">
            <div className="flex items-center gap-3">
              <button onClick={() => setMode('menu')} className="w-10 h-10 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-slate-200 transition-colors">
                <i className="fa-solid fa-arrow-left"></i>
              </button>
              <h2 className="text-xl font-bold text-slate-800">金系實驗室</h2>
            </div>
            <div className="flex items-center gap-4">
              <div className="bg-amber-100 text-amber-700 px-4 py-2 rounded-full font-bold text-sm hidden sm:block">
                <i className="fa-solid fa-vial mr-2"></i>進度：{getTotalTestsCount()} / 24
              </div>
              <button onClick={() => setMode('summary')} className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold text-sm hover:bg-indigo-700 transition-colors shadow">查看總表</button>
            </div>
          </header>

          <div className="flex-1 max-w-6xl w-full mx-auto p-4 flex flex-col lg:flex-row gap-6">
            <div className="w-full lg:w-1/3 flex flex-col gap-4">
              <div className="bg-white rounded-2xl p-2 shadow-sm flex flex-col sm:flex-row lg:flex-col gap-2">
                <button onClick={() => {setActiveTab('magnetism'); setTestState('idle'); setBenchItem(null);}} className={`flex-1 p-3 rounded-xl font-bold text-left flex items-center gap-3 transition-colors ${activeTab === 'magnetism' ? 'bg-red-50 text-red-600 border-2 border-red-200' : 'hover:bg-slate-50 text-slate-600 border-2 border-transparent'}`}>
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center ${activeTab === 'magnetism' ? 'bg-red-100' : 'bg-slate-100'}`}><i className="fa-solid fa-magnet"></i></div> 三年級：磁性測試
                </button>
                <button onClick={() => {setActiveTab('conductivity'); setTestState('idle'); setBenchItem(null);}} className={`flex-1 p-3 rounded-xl font-bold text-left flex items-center gap-3 transition-colors ${activeTab === 'conductivity' ? 'bg-yellow-50 text-yellow-600 border-2 border-yellow-200' : 'hover:bg-slate-50 text-slate-600 border-2 border-transparent'}`}>
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center ${activeTab === 'conductivity' ? 'bg-yellow-100' : 'bg-slate-100'}`}><i className="fa-solid fa-bolt"></i></div> 四年級：導電測試
                </button>
                <button onClick={() => {setActiveTab('rust'); setTestState('idle'); setBenchItem(null);}} className={`flex-1 p-3 rounded-xl font-bold text-left flex items-center gap-3 transition-colors ${activeTab === 'rust' ? 'bg-blue-50 text-blue-600 border-2 border-blue-200' : 'hover:bg-slate-50 text-slate-600 border-2 border-transparent'}`}>
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center ${activeTab === 'rust' ? 'bg-blue-100' : 'bg-slate-100'}`}><i className="fa-solid fa-droplet"></i></div> 六年級：生鏽測試
                </button>
              </div>

              <div className="bg-white rounded-2xl p-4 shadow-sm flex-1">
                <h3 className="font-bold text-slate-700 mb-3 pb-2 border-b"><i className="fa-solid fa-box-open mr-2"></i>選擇物品放上實驗桌</h3>
                <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-2 gap-3 overflow-y-auto no-scrollbar max-h-[40vh] lg:max-h-none">
                  {CAMPUS_ITEMS.map(item => {
                    let currentProperty = activeTab === 'magnetism' ? 'magnetic' : activeTab === 'conductivity' ? 'conductive' : 'rustable';
                    let isTested = testedResults[item.id] && testedResults[item.id][currentProperty] !== undefined;
                    let testPassed = isTested && testedResults[item.id][currentProperty];
                    return (
                      <button key={item.id} onClick={() => handleSelectBenchItem(item)} className={`p-3 rounded-xl border-2 flex flex-col items-center justify-center gap-2 transition-all relative ${benchItem?.id === item.id ? 'border-indigo-500 bg-indigo-50 shadow-md transform scale-105' : 'border-slate-100 bg-slate-50 hover:border-indigo-200 hover:bg-white'}`}>
                        <i className={`fa-solid ${item.icon} text-3xl ${item.color}`}></i>
                        <span className="font-bold text-sm text-slate-700">{item.name}</span>
                        {isTested && (<div className={`absolute -top-2 -right-2 w-6 h-6 rounded-full flex items-center justify-center text-xs text-white ${testPassed ? 'bg-green-500' : 'bg-slate-400'}`}><i className={`fa-solid ${testPassed ? 'fa-check' : 'fa-minus'}`}></i></div>)}
                      </button>
                    )
                  })}
                </div>
              </div>
            </div>

            <div className="w-full lg:w-2/3 bg-white rounded-3xl shadow-md p-6 flex flex-col">
              <div className="text-center mb-6">
                <h2 className="text-2xl font-black text-slate-800">
                  {activeTab === 'magnetism' && '🧲 神奇的磁鐵 (三年級)'}
                  {activeTab === 'conductivity' && '💡 燈泡亮了 (四年級)'}
                  {activeTab === 'rust' && '💧 鐵生鏽與防鏽 (六年級)'}
                </h2>
                <p className="text-slate-500 mt-2">請選擇左側物品，放上實驗桌進行測試</p>
              </div>

              <div className="flex-1 bg-slate-100 rounded-2xl border-4 border-slate-200 border-dashed flex flex-col items-center justify-center p-8 relative min-h-[350px]">
                {!benchItem ? (
                  <div className="text-slate-400 flex flex-col items-center">
                    <i className="fa-solid fa-hand-pointer text-5xl mb-4 floating"></i>
                    <p className="font-bold text-lg">等待放入物品...</p>
                  </div>
                ) : (
                  <div className="flex flex-col items-center w-full max-w-md">
                    <div className="flex items-center justify-center gap-8 mb-8 w-full">
                      <div className="flex flex-col items-center">
                        {activeTab === 'magnetism' && <i className={`fa-solid fa-magnet text-6xl text-red-500 ${testState === 'testing' ? 'animate-bounce' : ''}`}></i>}
                        {activeTab === 'conductivity' && <i className={`fa-solid fa-lightbulb text-6xl ${testState === 'result' && benchItem.conductive ? 'text-yellow-400 bulb-glow' : 'text-slate-400'}`}></i>}
                        {activeTab === 'rust' && <i className={`fa-solid fa-cloud-showers-water text-6xl text-blue-500 ${testState === 'testing' ? 'animate-pulse' : ''}`}></i>}
                      </div>
                      <div className="text-3xl text-slate-300">
                        {testState === 'idle' && <i className="fa-solid fa-arrow-right-arrow-left"></i>}
                        {testState === 'testing' && <i className="fa-solid fa-spinner fa-spin text-indigo-500"></i>}
                        {testState === 'result' && ((activeTab === 'magnetism' && benchItem.magnetic) || (activeTab === 'conductivity' && benchItem.conductive) || (activeTab === 'rust' && benchItem.rustable) ? <i className="fa-solid fa-check-circle text-green-500"></i> : <i className="fa-solid fa-times-circle text-slate-400"></i>)}
                      </div>
                      <div className="flex flex-col items-center">
                        <i className={`fa-solid ${benchItem.icon} text-6xl ${benchItem.color} ${testState === 'result' && activeTab === 'rust' && benchItem.rustable ? 'text-amber-800 transition-colors duration-1000' : ''} ${testState === 'result' && activeTab === 'magnetism' && benchItem.magnetic ? '-translate-x-6 transition-transform duration-500' : ''}`}></i>
                        <span className="mt-2 font-bold text-slate-700 bg-white px-3 py-1 rounded-full shadow-sm">{benchItem.name}</span>
                      </div>
                    </div>
                    {testState === 'idle' && (<button onClick={runTest} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-xl hover:bg-indigo-700 transition-colors shadow-lg"><i className="fa-solid fa-play mr-2"></i> 開始測試</button>)}
                    {testState === 'testing' && (<div className="w-full py-4 bg-slate-300 text-slate-600 rounded-xl font-bold text-xl text-center"><i className="fa-solid fa-microscope fa-spin mr-2"></i> 觀察中...</div>)}
                    {testState === 'result' && (<div className={`w-full p-6 rounded-xl font-bold text-center text-lg border-2 ${(activeTab === 'magnetism' && benchItem.magnetic) || (activeTab === 'conductivity' && benchItem.conductive) || (activeTab === 'rust' && benchItem.rustable) ? 'bg-green-50 border-green-200 text-green-800' : 'bg-slate-50 border-slate-200 text-slate-700'}`}>{feedbackMsg}<button onClick={() => setTestState('idle')} className="mt-4 px-6 py-2 bg-white text-slate-700 rounded-lg shadow-sm border text-sm hover:bg-slate-50 mx-auto block">重新測試</button></div>)}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );

      // --- 元件：六年級統整表 ---
      const renderSummary = () => (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8">
          <div className="max-w-5xl mx-auto">
            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8">
              <div>
                <button onClick={() => setMode('menu')} className="mb-4 text-indigo-600 font-bold hover:text-indigo-800 flex items-center gap-2">
                  <i className="fa-solid fa-arrow-left"></i> 返回主選單
                </button>
                <h1 className="text-3xl font-black text-slate-800"><i className="fa-solid fa-table-list text-emerald-500 mr-3"></i>物質的特性與分類</h1>
              </div>
              <button onClick={() => {setMode('quiz'); window.scrollTo(0, 0);}} className="mt-4 sm:mt-0 px-6 py-3 bg-rose-600 text-white rounded-xl font-bold shadow-lg hover:bg-rose-700 transition-colors">
                <i className="fa-solid fa-pen mr-2"></i> 前往線上測驗 (20題)
              </button>
            </div>

            <div className="bg-white rounded-3xl shadow-lg overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-slate-800 text-white">
                      <th className="p-4 font-bold text-lg border-b border-slate-700">物質名稱</th>
                      <th className="p-4 font-bold text-lg border-b border-slate-700 text-center"><i className="fa-solid fa-magnet text-red-400 mr-2"></i>具磁性</th>
                      <th className="p-4 font-bold text-lg border-b border-slate-700 text-center"><i className="fa-solid fa-bolt text-yellow-400 mr-2"></i>可導電</th>
                      <th className="p-4 font-bold text-lg border-b border-slate-700 text-center"><i className="fa-solid fa-droplet text-blue-400 mr-2"></i>易生鏽</th>
                    </tr>
                  </thead>
                  <tbody>
                    {CAMPUS_ITEMS.map((item, index) => {
                      const results = testedResults[item.id] || {};
                      const renderStatus = (propertyKey, expectedValue) => {
                        if (results[propertyKey] === undefined) return <span className="text-slate-300 font-normal"><i className="fa-solid fa-question-circle"></i> 尚未測試</span>;
                        return results[propertyKey] === expectedValue 
                          ? <span className="text-green-600 font-bold bg-green-50 px-3 py-1 rounded-full"><i className="fa-solid fa-check mr-1"></i> 是</span> 
                          : <span className="text-slate-400 font-bold bg-slate-50 px-3 py-1 rounded-full"><i className="fa-solid fa-xmark mr-1"></i> 否</span>;
                      };
                      return (
                        <tr key={item.id} className={`border-b border-slate-100 hover:bg-slate-50 transition-colors ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'}`}>
                          <td className="p-4 flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center border">
                              <i className={`fa-solid ${item.icon} ${item.color} text-lg`}></i>
                            </div>
                            <span className="font-bold text-slate-800">{item.name}</span>
                          </td>
                          <td className="p-4 text-center border-l border-slate-100">{renderStatus('magnetic', true)}</td>
                          <td className="p-4 text-center border-l border-slate-100">{renderStatus('conductive', true)}</td>
                          <td className="p-4 text-center border-l border-slate-100">{renderStatus('rustable', true)}</td>
                        </tr>
                      )
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );

      // --- 元件：20題線上測驗與試算表紀錄 ---
      const renderQuiz = () => (
        <div className="min-h-screen bg-slate-100 p-4 md:p-8 flex justify-center">
          <div className="max-w-3xl w-full">
            
            {/* 頂部導覽列(測驗專用) */}
            <div className="flex items-center justify-between mb-6 sticky top-4 z-50 bg-white/90 backdrop-blur px-6 py-3 rounded-2xl shadow-sm border border-slate-200">
              <button onClick={() => setMode('menu')} className="text-slate-500 font-bold hover:text-slate-800 flex items-center gap-2">
                <i className="fa-solid fa-arrow-left"></i> 回主選單
              </button>
              {!submitSuccess && (
                <div className="font-black text-rose-600 flex items-center gap-2 bg-rose-50 px-4 py-1.5 rounded-full">
                  <i className="fa-solid fa-list-check"></i> 
                  進度：{answeredCount} / 20
                </div>
              )}
            </div>
            
            <div className="bg-white rounded-3xl shadow-xl overflow-hidden mb-10">
              {/* 測驗標頭 */}
              <div className="bg-gradient-to-r from-rose-500 to-pink-600 p-8 text-white text-center relative overflow-hidden">
                <i className="fa-solid fa-clipboard-check text-6xl mb-4 relative z-10"></i>
                <h2 className="text-4xl font-black relative z-10">金系學習大挑戰</h2>
                <p className="mt-3 text-rose-100 text-lg relative z-10">共 20 題，一題 5 分。作答完畢將顯示成績並傳送給老師！</p>
                <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
              </div>

              {submitSuccess ? (
                /* 成績結算畫面 */
                <div className="p-10 text-center flex flex-col items-center bg-slate-50">
                  <div className="w-32 h-32 rounded-full flex items-center justify-center mb-6 shadow-lg border-8 border-white
                    ${finalScore >= 80 ? 'bg-green-500' : finalScore >= 60 ? 'bg-yellow-500' : 'bg-red-500'}
                  " style={{ backgroundColor: finalScore >= 80 ? '#22c55e' : finalScore >= 60 ? '#eab308' : '#ef4444' }}>
                    <span className="text-5xl font-black text-white">{finalScore}</span>
                  </div>
                  
                  <h3 className="text-3xl font-black text-slate-800 mb-2">測驗完成！</h3>
                  <p className="text-lg text-slate-600 mb-8 font-medium">
                    {quizAnswers.name} 同學，你的資料與成績已經成功寫入雲端試算表。
                  </p>
                  
                  <div className="flex gap-4">
                    <button onClick={() => {setMode('menu'); setSubmitSuccess(false); setQuizAnswers({name: '', answers: {}}); setFinalScore(0);}} className="px-6 py-3 bg-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-300 transition-colors shadow-sm">
                      <i className="fa-solid fa-house mr-2"></i>回首頁
                    </button>
                    <button onClick={() => {setMode('lab');}} className="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors shadow-md">
                      <i className="fa-solid fa-flask mr-2"></i>回實驗室複習
                    </button>
                  </div>
                </div>
              ) : (
                /* 20 題作答表單 */
                <form onSubmit={handleSubmitQuiz} className="p-6 md:p-10 space-y-8">
                  {/* 基本資料輸入 */}
                  <div className="bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                    <label className="block text-indigo-900 font-black mb-2 text-xl">
                      <i className="fa-solid fa-id-card mr-2 text-indigo-500"></i>你的姓名或座號：
                    </label>
                    <input 
                      type="text" 
                      required
                      value={quizAnswers.name}
                      onChange={(e) => setQuizAnswers({...quizAnswers, name: e.target.value})}
                      className="w-full px-4 py-3 rounded-xl border-2 border-indigo-200 focus:border-indigo-500 focus:ring-0 outline-none transition-colors text-lg"
                      placeholder="請輸入姓名，例如：王小明"
                    />
                  </div>

                  <div className="w-full h-px bg-slate-200 my-8"></div>

                  {/* 選擇題清單 */}
                  {QUIZ_QUESTIONS.map((q, index) => (
                    <div key={q.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                      <div className="flex items-start gap-3 mb-4">
                        <div className="w-8 h-8 shrink-0 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold">
                          {index + 1}
                        </div>
                        <div>
                          <span className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md mb-2 inline-block">{q.category}</span>
                          <h4 className="text-slate-800 font-bold text-lg leading-relaxed">{q.text}</h4>
                        </div>
                      </div>
                      
                      <div className="space-y-3 pl-11">
                        {q.options.map((option, optIdx) => (
                          <label key={optIdx} className={`flex items-center space-x-3 cursor-pointer p-3 rounded-xl transition-all border-2
                            ${quizAnswers.answers[q.id] === option ? 'bg-rose-50 border-rose-400' : 'bg-slate-50 border-transparent hover:bg-slate-100'}
                          `}>
                            <input 
                              type="radio" 
                              name={`q${q.id}`} 
                              value={option} 
                              required
                              checked={quizAnswers.answers[q.id] === option}
                              onChange={() => handleOptionSelect(q.id, option)}
                              className="w-5 h-5 text-rose-500 border-slate-300 focus:ring-rose-500"
                            />
                            <span className={`font-medium ${quizAnswers.answers[q.id] === option ? 'text-rose-700 font-bold' : 'text-slate-700'}`}>
                              {option}
                            </span>
                          </label>
                        ))}
                      </div>
                    </div>
                  ))}

                  {/* 提交按鈕區塊 */}
                  <div className="pt-8">
                    <button 
                      type="submit" 
                      disabled={isSubmitting}
                      className="w-full py-5 bg-rose-600 text-white rounded-2xl font-black text-2xl hover:bg-rose-700 transition-all shadow-xl hover:shadow-rose-500/30 disabled:opacity-70 flex justify-center items-center gap-3"
                    >
                      {isSubmitting ? <><i className="fa-solid fa-spinner fa-spin"></i> 計算分數與傳送中...</> : <><i className="fa-solid fa-paper-plane"></i> 繳交考卷 (總分100分)</>}
                    </button>
                    <p className="text-sm text-center text-slate-400 mt-4">
                      請確認 20 題皆已作答完畢再送出。
                    </p>
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      );

      return (
        <div className="app-container">
          {mode === 'menu' && renderMenu()}
          {mode === 'lab' && renderLab()}
          {mode === 'summary' && renderSummary()}
          {mode === 'quiz' && renderQuiz()}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
